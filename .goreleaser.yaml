version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: olk-darwin
    main: ./cmd/olk
    binary: olk
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rlrghb/olkcli/internal/cmd.Version={{.Version}}
      - -X github.com/rlrghb/olkcli/internal/cmd.Commit={{.Commit}}
      - -X github.com/rlrghb/olkcli/internal/cmd.Date={{.Date}}

archives:
  - name_template: "olk_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"
  extra_files:
    - glob: ./prebuilt-archives/*

release:
  extra_files:
    - glob: ./prebuilt-archives/*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: rlrghb
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: olk
    binaries:
      - olk
    homepage: https://github.com/rlrghb/olkcli
    description: CLI for Microsoft Outlook via Microsoft Graph API
    license: MIT
