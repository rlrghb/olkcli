version: "2"
linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errname
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: unexported-return
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rlrghb/olkcli
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
